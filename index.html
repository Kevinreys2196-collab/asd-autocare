<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ASD Auto Care — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0a0a0a; --surface:#0f0f0f; --surface2:#141414;
      --border:rgba(255,255,255,0.07); --white:#f0f0eb;
      --mid:#909088; --dim:#3a3a38;
      --accent:#c8b98a; --green:#52c481; --red:#d96060;
      --yellow:#d4a84b; --blue:#6090d8;
      --ff:'DM Sans',sans-serif; --fd:'Cormorant Garamond',serif;
    }
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--white);font-family:var(--ff);font-weight:300;min-height:100vh;font-size:14px;}

    /* ── LOGIN ── */
    #loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;}
    .lbox{border:1px solid var(--border);padding:2.5rem;width:100%;max-width:340px;background:var(--surface);display:flex;flex-direction:column;gap:1rem;}
    .lbox-title{font-family:var(--fd);font-size:1.7rem;font-weight:300;text-align:center;}
    .lbox-title b{color:var(--accent);font-weight:600;}
    .lbox-sub{font-size:0.68rem;color:var(--dim);text-align:center;letter-spacing:0.18em;text-transform:uppercase;}
    .lbox input{background:#111;border:1px solid var(--border);color:var(--white);padding:0.8rem 1rem;font-family:var(--ff);font-size:0.88rem;outline:none;width:100%;transition:border-color 0.3s;}
    .lbox input:focus{border-color:var(--accent);}
    .lbox-btn{background:var(--white);color:var(--bg);border:none;padding:0.85rem;font-family:var(--ff);font-size:0.75rem;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:background 0.3s;}
    .lbox-btn:hover{background:var(--accent);}
    .lbox-err{font-size:0.75rem;color:var(--red);text-align:center;display:none;}

    /* ── HEADER ── */
    #adminUI{display:none;}
    header{background:rgba(10,10,10,0.96);border-bottom:1px solid var(--border);padding:0.85rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px);}
    .hlogo{font-family:var(--fd);font-size:1rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;display:flex;align-items:center;gap:0.5rem;}
    .hlogo b{color:var(--accent);}
    .hlogo-tag{font-size:0.55rem;color:var(--dim);letter-spacing:0.2em;text-transform:uppercase;}
    .live{width:6px;height:6px;background:var(--green);border-radius:50%;display:inline-block;animation:blink 2s infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
    .hright{display:flex;align-items:center;gap:0.7rem;}
    .stimer{font-size:0.65rem;color:var(--mid);}
    .stimer.warn{color:var(--red);}
    .hbtn{background:transparent;border:1px solid var(--border);color:var(--mid);padding:0.4rem 0.9rem;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;font-family:var(--ff);transition:all 0.25s;}
    .hbtn:hover{border-color:var(--accent);color:var(--accent);}
    .hbtn.out:hover{border-color:var(--red);color:var(--red);}

    main{max-width:1080px;margin:0 auto;padding:1.5rem;}

    /* ════════════════════════════════
       METRICS — single clean row
    ════════════════════════════════ */
    .kpi-strip{
      display:flex;
      border:1px solid var(--border);
      background:var(--surface);
      margin-bottom:1.5rem;
      overflow-x:auto;
    }
    .kpi{
      flex:1;min-width:120px;
      padding:1rem 1.1rem;
      border-right:1px solid var(--border);
    }
    .kpi:last-child{border-right:none;}
    .kpi-lbl{font-size:0.55rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--dim);margin-bottom:0.35rem;}
    .kpi-val{font-family:var(--fd);font-size:1.75rem;font-weight:400;line-height:1;color:var(--white);}
    .kpi-note{font-size:0.65rem;color:var(--mid);margin-top:0.2rem;}
    .kpi.g .kpi-val{color:#6dd99a;}
    .kpi.a .kpi-val{color:#d4c49a;}
    .kpi.b .kpi-val{color:#7aabf0;}
    .kpi.r .kpi-val{color:#e08080;}
    .kpi.y .kpi-val{color:#e8c26a;}

    /* ── TABS ── */
    .tabs{display:flex;gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:1.5rem;overflow-x:auto;}
    .tbtn{background:var(--surface);border:none;color:var(--mid);padding:0.75rem 1.1rem;font-family:var(--ff);font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all 0.25s;white-space:nowrap;flex:1;}
    .tbtn.active{background:var(--white);color:var(--bg);font-weight:500;}

    /* ── FILTER ── */
    .fbar{display:flex;gap:0.4rem;margin-bottom:1.2rem;flex-wrap:wrap;align-items:center;}
    .fbtn{background:var(--surface);border:1px solid var(--border);color:var(--mid);padding:0.38rem 0.85rem;font-family:var(--ff);font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.25s;}
    .fbtn.active,.fbtn:hover{border-color:var(--accent);color:var(--accent);}
    .fdate{background:var(--surface);border:1px solid var(--border);color:var(--white);padding:0.38rem 0.7rem;font-family:var(--ff);font-size:0.72rem;outline:none;}

    /* ── CALENDAR ── */
    .calday{border:1px solid var(--border);background:var(--surface);margin-bottom:1.2rem;}
    .calhead{padding:0.7rem 1.2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .caldate{font-family:var(--fd);font-size:1.05rem;}
    .caldate span{color:var(--accent);font-size:0.8em;}
    .calslots{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,0.03);}
    .calslot{background:var(--bg);padding:0.9rem;min-height:76px;}
    .calslot.taken{background:#0d0d0d;}
    .cstime{font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim);margin-bottom:0.4rem;}
    .csfree{font-size:0.72rem;color:var(--dim);font-style:italic;}
    .csname{font-size:0.82rem;color:var(--white);font-weight:400;margin-bottom:0.15rem;}
    .csveh{font-size:0.68rem;color:var(--mid);}
    .upill{display:inline-block;font-size:0.56rem;letter-spacing:0.1em;text-transform:uppercase;background:rgba(217,96,96,0.12);color:var(--red);border:1px solid rgba(217,96,96,0.28);padding:0.1rem 0.4rem;margin-top:0.25rem;}

    /* ── RES CARDS ── */
    .rlist{display:flex;flex-direction:column;gap:1px;}
    .rcard{background:var(--surface);border:1px solid var(--border);padding:1rem 1.3rem;display:grid;grid-template-columns:1fr 130px 110px auto;gap:0.9rem;align-items:start;transition:background 0.2s;}
    .rcard:hover{background:var(--surface2);}
    .rcard.urg{border-left:2px solid var(--red);}
    .rname{font-size:0.87rem;font-weight:400;color:var(--white);display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.35rem;}
    .rdet{font-size:0.7rem;color:var(--mid);line-height:1.7;}
    .rdatecol{display:flex;flex-direction:column;gap:0.18rem;}
    .rdate{font-family:var(--fd);font-size:0.95rem;color:var(--white);}
    .rhora{font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);}
    .rcreated{font-size:0.6rem;color:var(--dim);margin-top:0.25rem;}
    .pcol{display:flex;flex-direction:column;gap:0.35rem;}
    .plbl{font-size:0.56rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim);}
    .psel{background:#111;border:1px solid var(--border);color:var(--white);padding:0.32rem 0.5rem;font-family:var(--ff);font-size:0.7rem;outline:none;cursor:pointer;width:100%;}
    .acts{display:flex;flex-direction:column;gap:0.3rem;}
    .ab{border:none;padding:0.32rem 0.75rem;font-family:var(--ff);font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s;white-space:nowrap;display:flex;align-items:center;gap:0.25rem;justify-content:center;text-decoration:none;}
    .ab:hover{opacity:0.78;}
    .ab:disabled{opacity:0.2;cursor:not-allowed;}
    .ac{background:var(--green);color:#000;}
    .ap{background:var(--blue);color:#fff;}
    .ao{background:var(--accent);color:#000;}
    .aw{background:#25D366;color:#fff;}
    .ax{background:transparent;border:1px solid var(--red)!important;color:var(--red);}
    .ad{background:transparent;border:1px solid rgba(217,96,96,0.3)!important;color:rgba(217,96,96,0.6);}
    .apd{background:var(--red);color:#fff;}
    .adl{background:transparent;border:1px solid rgba(200,185,138,0.3)!important;color:var(--accent);font-size:0.62rem;}

    /* BADGES */
    .bdg{display:inline-flex;align-items:center;font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.15rem 0.45rem;border:1px solid;}
    .bp{background:rgba(212,168,75,0.1);color:var(--yellow);border-color:rgba(212,168,75,0.28);}
    .bc{background:rgba(82,196,129,0.1);color:var(--green);border-color:rgba(82,196,129,0.28);}
    .bco{background:rgba(200,185,138,0.1);color:var(--accent);border-color:rgba(200,185,138,0.28);}
    .bca{background:rgba(217,96,96,0.1);color:var(--red);border-color:rgba(217,96,96,0.28);}
    .be{background:rgba(120,120,120,0.08);color:var(--mid);border-color:rgba(120,120,120,0.2);}
    .bpd{background:rgba(82,196,129,0.1);color:var(--green);border-color:rgba(82,196,129,0.28);font-size:0.52rem;}
    .bup{background:rgba(212,168,75,0.1);color:var(--yellow);border-color:rgba(212,168,75,0.28);font-size:0.52rem;}

    /* ════════════════════════════════
       SUMMARY CARDS — narrative style
    ════════════════════════════════ */
    .sum-wrap{margin-bottom:2rem;}
    .sum-period-label{
      font-size:0.6rem;letter-spacing:0.28em;text-transform:uppercase;
      color:var(--dim);margin-bottom:0.75rem;
    }
    .sum-card{
      border:1px solid var(--border);
      background:var(--surface);
      display:grid;
      grid-template-columns:1fr 260px;
    }

    /* left — text */
    .sum-left{
      padding:1.4rem 1.5rem;
      border-right:1px solid var(--border);
      display:flex;flex-direction:column;gap:1.1rem;
    }
    .sum-headline{
      font-family:var(--fd);font-size:2rem;font-weight:300;line-height:1.1;
      color:var(--white);
    }
    .sum-headline .hl-green{color:#6dd99a;}
    .sum-headline .hl-dim{color:var(--mid);font-size:1.2rem;}
    .sum-points{
      list-style:none;
      display:flex;flex-direction:column;gap:0.55rem;
      border-top:1px solid var(--border);
      padding-top:1rem;
    }
    .sum-points li{
      display:grid;
      grid-template-columns:16px 1fr;
      gap:0.5rem;
      font-size:0.8rem;color:var(--mid);line-height:1.5;
    }
    .sum-points li .dot{
      width:4px;height:4px;background:var(--accent);border-radius:50%;
      margin-top:0.45rem;justify-self:center;
    }
    .sum-points li strong{color:var(--white);font-weight:500;}
    .sum-points li.ok strong{color:#6dd99a;}
    .sum-points li.warn strong{color:#e08080;}
    .sum-points li.note{color:var(--dim);}
    .sum-dl{
      display:flex;gap:0.5rem;padding-top:0.5rem;
      border-top:1px solid var(--border);
    }

    /* right — chart */
    .sum-right{
      padding:1.4rem 1.3rem;
      display:flex;flex-direction:column;gap:1.1rem;
    }
    .chart-title{
      font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;
      color:var(--dim);
    }
    .bars{display:flex;flex-direction:column;gap:0.9rem;}
    .bar-row{display:flex;flex-direction:column;gap:0.28rem;}
    .bar-meta{display:flex;justify-content:space-between;}
    .bar-name{font-size:0.68rem;color:var(--mid);}
    .bar-val{font-size:0.68rem;color:var(--white);font-weight:500;}
    .bar-track{height:4px;background:rgba(255,255,255,0.05);}
    .bar-fill{height:100%;transition:width 0.7s ease;}
    .bg{background:var(--green);}
    .ba{background:var(--accent);}
    .br{background:var(--red);}
    .bb{background:var(--blue);}

    /* chart legend */
    .chart-legend{display:flex;flex-wrap:wrap;gap:0.6rem;padding-top:0.6rem;border-top:1px solid var(--border);}
    .leg-item{display:flex;align-items:center;gap:0.35rem;font-size:0.62rem;color:var(--mid);}
    .leg-dot{width:8px;height:8px;border-radius:0;}

    /* empty period */
    .sum-empty{
      border:1px solid var(--border);background:var(--surface);
      padding:2rem;text-align:center;font-size:0.8rem;color:var(--dim);
    }

    /* HIST BLOCKS */
    .hblock{margin-bottom:2rem;}
    .hblock-title{font-size:0.62rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);margin-bottom:0.8rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);}

    /* ADD FORM */
    .addform{border:1px solid var(--border);padding:1.2rem;background:var(--surface);margin-bottom:1.5rem;}
    .addform-title{font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:0.8rem;}
    .frow{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:0.5rem;margin-bottom:0.5rem;}
    .frow input,.frow select{background:#111;border:1px solid var(--border);color:var(--white);padding:0.55rem 0.8rem;font-family:var(--ff);font-size:0.77rem;outline:none;width:100%;}
    .frow select option{background:#111;}

    /* SECTION TITLE */
    .stitle{font-family:var(--fd);font-size:1.2rem;font-weight:300;margin-bottom:0.8rem;}

    /* MODALS */
    .mover{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:800;align-items:center;justify-content:center;}
    .mover.show{display:flex;}
    .mbox{background:var(--surface);border:1px solid rgba(255,255,255,0.1);padding:1.8rem;width:100%;max-width:360px;display:flex;flex-direction:column;gap:0.9rem;}
    .mtitle{font-family:var(--fd);font-size:1.25rem;font-weight:300;}
    .mbox input,.mbox select{background:#111;border:1px solid var(--border);color:var(--white);padding:0.65rem 0.85rem;font-family:var(--ff);font-size:0.82rem;outline:none;width:100%;}
    .macts{display:flex;gap:0.5rem;}

    /* REVIEWS */
    .revcard{background:var(--surface);border:1px solid var(--border);padding:1rem 1.2rem;display:grid;grid-template-columns:1fr auto;gap:0.8rem;margin-bottom:1px;}
    .revstars{color:var(--accent);font-size:0.8rem;margin-bottom:0.2rem;}
    .revtext{font-size:0.8rem;color:var(--mid);font-style:italic;margin-bottom:0.2rem;}
    .revauthor{font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);}
    .revacts{display:flex;gap:0.4rem;flex-wrap:wrap;align-items:flex-start;}

    .empty{padding:2.5rem;text-align:center;color:var(--dim);font-size:0.78rem;border:1px solid var(--border);}
    input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:0.4;cursor:pointer;}

    @media(max-width:760px){
      .rcard{grid-template-columns:1fr;}
      .calslots{grid-template-columns:1fr;}
      .sum-card{grid-template-columns:1fr;}
      .sum-right{border-top:1px solid var(--border);}
      main{padding:1rem;}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lbox">
    <p class="lbox-sub">Panel de administración</p>
    <h1 class="lbox-title">ASD <b>Auto</b> Care</h1>
    <input type="password" id="pwInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter')login()" autocomplete="current-password"/>
    <button class="lbox-btn" onclick="login()">Ingresar</button>
    <p class="lbox-err" id="loginErr"></p>
  </div>
</div>

<!-- RESCHEDULE MODAL -->
<div class="mover" id="modalRe">
  <div class="mbox">
    <p class="mtitle">Reprogramar cita</p>
    <input type="date" id="newFecha"/>
    <select id="newHora">
      <option value="8:00 AM">8:00 AM</option>
      <option value="11:00 AM">11:00 AM</option>
      <option value="2:00 PM">2:00 PM</option>
    </select>
    <div class="macts">
      <button class="ab ac" style="flex:1;padding:0.65rem;" onclick="confirmReschedule()">Confirmar</button>
      <button class="ab ax" style="flex:1;padding:0.65rem;" onclick="closeModals()">Cancelar</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="mover" id="modalDel">
  <div class="mbox">
    <p class="mtitle">¿Eliminar definitivamente?</p>
    <p style="font-size:0.78rem;color:var(--mid);line-height:1.6;">Esta acción no se puede deshacer.</p>
    <div class="macts">
      <button class="ab apd" style="flex:1;padding:0.65rem;" onclick="confirmPermDelete()">Eliminar</button>
      <button class="ab ax" style="flex:1;padding:0.65rem;" onclick="closeModals()">Cancelar</button>
    </div>
  </div>
</div>

<!-- ADMIN UI -->
<div id="adminUI">
  <header>
    <div class="hlogo">
      ASD <b>Auto</b> Care
      <span class="hlogo-tag">Admin</span>
      <span class="live"></span>
    </div>
    <div class="hright">
      <span class="stimer" id="stimer"></span>
      <button class="hbtn" onclick="exportCSV()">CSV</button>
      <button class="hbtn out" onclick="logout()">Salir</button>
    </div>
  </header>

  <main>

    <!-- KPI STRIP -->
    <div class="kpi-strip" id="kpiStrip"></div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tbtn active" onclick="showTab('hoy')">Hoy</button>
      <button class="tbtn" onclick="showTab('activas')">Activas</button>
      <button class="tbtn" onclick="showTab('historial')">Historial</button>
      <button class="tbtn" onclick="showTab('resenas')">Reseñas</button>
    </div>

    <!-- HOY -->
    <div id="tab-hoy">
      <div class="fbar">
        <button class="fbtn active" onclick="setF('today',this)">Hoy</button>
        <button class="fbtn" onclick="setF('tomorrow',this)">Mañana</button>
        <button class="fbtn" onclick="setF('week',this)">Esta semana</button>
        <input type="date" class="fdate" id="customDate" onchange="setF('custom',null)"/>
      </div>
      <div id="calView"></div>
    </div>

    <!-- ACTIVAS -->
    <div id="tab-activas" style="display:none;">
      <div class="addform">
        <p class="addform-title">+ Agregar reserva manual</p>
        <div class="frow">
          <input type="text" id="aN" placeholder="Nombre completo"/>
          <input type="tel" id="aT" placeholder="Teléfono"/>
          <input type="text" id="aM" placeholder="Manzana (Ej. 3)"/>
          <input type="text" id="aL" placeholder="Lote (Ej. 12)"/>
        </div>
        <div class="frow">
          <select id="aV"><option value="Sedán">Sedán – Q80</option><option value="Pickup / SUV">Pickup / SUV – Q100</option></select>
          <input type="date" id="aF"/>
          <select id="aH"><option value="8:00 AM">8:00 AM</option><option value="11:00 AM">11:00 AM</option><option value="2:00 PM">2:00 PM</option></select>
          <select id="aP"><option value="pendiente">Pago pendiente</option><option value="pagado">Pagado</option></select>
        </div>
        <button class="ab ac" style="padding:0.55rem 1.2rem;" onclick="addManual()">+ Agregar</button>
      </div>
      <p class="stitle">Reservas activas</p>
      <div class="rlist" id="activeList"></div>
    </div>

    <!-- HISTORIAL -->
    <div id="tab-historial" style="display:none;">
      <div id="summarySection"></div>
      <div class="hblock"><p class="hblock-title">Completadas</p><div class="rlist" id="hComp"></div></div>
      <div class="hblock"><p class="hblock-title">Canceladas</p><div class="rlist" id="hCan"></div></div>
      <div class="hblock"><p class="hblock-title">Eliminadas</p><div class="rlist" id="hEli"></div></div>
    </div>

    <!-- RESEÑAS -->
    <div id="tab-resenas" style="display:none;">
      <p class="stitle">Pendientes de aprobación</p>
      <div id="resPend"></div>
      <p class="stitle" style="margin-top:1.5rem;">Publicadas</p>
      <div id="resPub"></div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const sb = supabase.createClient(URL_SB, KEY_SB);

const PH = btoa('AsdAutoCare2196');
const SEXP = 25*60*1000, MAX_A = 5, LOCK = 10*60*1000;
let sInt, reId=null, delId=null, allR=[], allRev=[], cFilt='today';

/* ── AUTH ── */
function ga(){try{return JSON.parse(sessionStorage.getItem('_a')||'{"c":0,"l":0}');}catch{return{c:0,l:0};}}
function sa(a){sessionStorage.setItem('_a',JSON.stringify(a));}

function login(){
  const a=ga();
  if(a.l>Date.now()){err(`Bloqueado ${Math.ceil((a.l-Date.now())/60000)} min.`);return;}
  const v=document.getElementById('pwInput').value;
  if(btoa(v)===PH){sa({c:0,l:0});sessionStorage.setItem('_exp',Date.now()+SEXP);boot();}
  else{a.c++;if(a.c>=MAX_A){a.l=Date.now()+LOCK;a.c=0;err('Bloqueado 10 min.');}else err(`Contraseña incorrecta (${MAX_A-a.c} intentos)`);sa(a);document.getElementById('pwInput').value='';}
}
function err(m){const e=document.getElementById('loginErr');e.textContent=m;e.style.display='block';}
function logout(){sessionStorage.removeItem('_exp');clearInterval(sInt);location.reload();}
function boot(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminUI').style.display='block';
  startTimer(); loadAll(); subRT();
}
function startTimer(){
  sInt=setInterval(()=>{
    const r=parseInt(sessionStorage.getItem('_exp')||0)-Date.now();
    if(r<=0){logout();return;}
    const el=document.getElementById('stimer');
    el.textContent=`Sesión ${Math.floor(r/60000)}:${String(Math.floor((r%60000)/1000)).padStart(2,'0')}`;
    el.className='stimer'+(r<180000?' warn':'');
  },1000);
  ['click','keydown'].forEach(e=>document.addEventListener(e,()=>{if(sessionStorage.getItem('_exp'))sessionStorage.setItem('_exp',Date.now()+SEXP);},{passive:true}));
}
if(sessionStorage.getItem('_exp')&&+sessionStorage.getItem('_exp')>Date.now())boot();

/* ── DATA ── */
async function loadAll(){
  const[r1,r2]=await Promise.all([
    sb.from('reservas').select('*').order('created_at',{ascending:false}),
    sb.from('resenas').select('*').order('created_at',{ascending:false})
  ]);
  allR=r1.data||[]; allRev=r2.data||[];
  renderAll();
}
function subRT(){
  sb.channel('adm3')
    .on('postgres_changes',{event:'*',schema:'public',table:'reservas'},()=>loadAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'resenas'},()=>loadAll())
    .subscribe();
}

/* ── HELPERS ── */
function td(){return new Date().toISOString().split('T')[0];}
function tmo(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().split('T')[0];}
function wk(){const a=[];for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()+i);a.push(d.toISOString().split('T')[0]);}return a;}
function ds(r){return String(r.fecha||'').split('T')[0];}
function fd(s){if(!s)return'';const[y,m,d]=String(s).split('T')[0].split('-');return`${d} ${['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+m-1]} ${y}`;}
function fdt(s){if(!s)return'';const d=new Date(s);return`${d.toLocaleDateString('es-GT')} ${d.toLocaleTimeString('es-GT',{hour:'2-digit',minute:'2-digit'})}`;}
function isUrg(f,h){const m={'8:00 AM':'08:00','11:00 AM':'11:00','2:00 PM':'14:00'};const t=new Date(`${f}T${m[h]||'08:00'}:00`);return(t-Date.now())<43200000&&t>Date.now();}
function bdg(s){const map={pendiente:'bp',confirmada:'bc',completada:'bco',cancelada:'bca',eliminada:'be'};return`<span class="bdg ${map[s]||'be'}">${s}</span>`;}
function pbdg(s){return s==='pagado'?`<span class="bdg bpd">Pagado</span>`:`<span class="bdg bup">Sin cobrar</span>`;}

/* ── KPI STRIP ── */
function renderKPI(){
  const r=allR;
  const wAgo=new Date(Date.now()-7*86400000).toISOString().split('T')[0];
  const cp=r.filter(x=>x.status==='completada'&&x.estado_pago==='pagado');
  const ingT=cp.reduce((s,x)=>s+(x.precio||0),0);
  const ingW=cp.filter(x=>ds(x)>=wAgo).reduce((s,x)=>s+(x.precio||0),0);
  const nComp=r.filter(x=>x.status==='completada').length;
  const nCan=r.filter(x=>x.status==='cancelada').length;
  const nAll=r.filter(x=>x.status!=='eliminada').length;
  const cr=nAll?Math.round(nCan/nAll*100):0;
  const nPend=r.filter(x=>x.status==='pendiente').length;
  const nConf=r.filter(x=>x.status==='confirmada').length;
  document.getElementById('kpiStrip').innerHTML=`
    <div class="kpi g"><div class="kpi-lbl">Ingresos totales</div><div class="kpi-val">Q${ingT}</div><div class="kpi-note">completadas · pagadas</div></div>
    <div class="kpi a"><div class="kpi-lbl">Esta semana</div><div class="kpi-val">Q${ingW}</div><div class="kpi-note">últimos 7 días</div></div>
    <div class="kpi b"><div class="kpi-lbl">Completados</div><div class="kpi-val">${nComp}</div></div>
    <div class="kpi r"><div class="kpi-lbl">Cancelaciones</div><div class="kpi-val">${cr}%</div><div class="kpi-note">${nCan} de ${nAll}</div></div>
    <div class="kpi y"><div class="kpi-lbl">Pendientes</div><div class="kpi-val">${nPend}</div></div>
    <div class="kpi" ><div class="kpi-lbl">Confirmadas</div><div class="kpi-val">${nConf}</div></div>`;
}

/* ── SUMMARY CARDS ── */
function sumCard(label, recs, dlKey){
  if(!recs.length) return `<div class="sum-empty">Sin actividad registrada en este período.</div>`;

  const comp  = recs.filter(x=>x.status==='completada');
  const can   = recs.filter(x=>x.status==='cancelada');
  const pend  = recs.filter(x=>x.status==='pendiente');
  const conf  = recs.filter(x=>x.status==='confirmada');
  const ingC  = comp.filter(x=>x.estado_pago==='pagado').reduce((s,x)=>s+(x.precio||0),0);
  const ingP  = comp.filter(x=>x.estado_pago!=='pagado').reduce((s,x)=>s+(x.precio||0),0);
  const total = recs.filter(x=>x.status!=='eliminada').length;
  const cr    = total?Math.round(can.length/total*100):0;
  const sedan = comp.filter(x=>(x.tipo_vehiculo||'').includes('edán')).length;
  const suv   = comp.filter(x=>(x.tipo_vehiculo||'').includes('SUV')||(x.tipo_vehiculo||'').includes('ickup')).length;

  /* headline text */
  const hlMain = ingC>0 ? `<span class="hl-green">Q${ingC}</span>` : `<span class="hl-dim">Q0</span>`;
  const hlSub  = ingC>0 ? ` cobrados este período` : ` sin ingresos cobrados aún`;

  /* bullet points */
  const pts = [];
  pts.push(`<li class="${ingC>0?'ok':''}"><span class="dot"></span><span>Ingresos cobrados: <strong>Q${ingC}</strong>${ingP>0?` · Por cobrar: <strong>Q${ingP}</strong>`:''}</span></li>`);
  pts.push(`<li><span class="dot"></span><span>Servicios completados: <strong>${comp.length}</strong>${sedan+suv>0?` (${sedan} Sedán, ${suv} SUV/Pickup)`:''}</span></li>`);
  pts.push(`<li class="${cr>20?'warn':''}"><span class="dot"></span><span>Cancelaciones: <strong>${can.length}</strong> — tasa <strong>${cr}%</strong></span></li>`);
  if(pend.length+conf.length>0)
    pts.push(`<li><span class="dot"></span><span>Reservas activas: <strong>${pend.length+conf.length}</strong> (${pend.length} pendientes, ${conf.length} confirmadas)</span></li>`);
  if(ingP>0)
    pts.push(`<li class="warn"><span class="dot"></span><span>Pendiente de cobro: <strong>Q${ingP}</strong> en ${comp.filter(x=>x.estado_pago!=='pagado').length} servicio(s) completado(s)</span></li>`);

  /* bars */
  const maxB = Math.max(comp.length, can.length, pend.length+conf.length, 1);
  function bar(name, val, max, cls, valLabel){
    const pct = max>0?Math.round(val/max*100):0;
    return `<div class="bar-row">
      <div class="bar-meta"><span class="bar-name">${name}</span><span class="bar-val">${valLabel!==undefined?valLabel:val}</span></div>
      <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
    </div>`;
  }

  const barsHTML = `
    ${bar('Completados', comp.length, maxB, 'bg')}
    ${bar('Activos', pend.length+conf.length, maxB, 'ba')}
    ${bar('Cancelados', can.length, maxB, 'br')}
    ${bar('Ingresos', ingC, Math.max(ingC,ingP,1), 'bb', 'Q'+ingC)}`;

  return `
  <div class="sum-wrap">
    <div class="sum-period-label">${label}</div>
    <div class="sum-card">
      <div class="sum-left">
        <div class="sum-headline">${hlMain}<span style="font-family:var(--ff);font-size:0.82rem;color:var(--mid);font-weight:300;">${hlSub}</span></div>
        <ul class="sum-points">${pts.join('')}</ul>
        <div class="sum-dl">
          <button class="ab adl" onclick="dlCSV('${dlKey}')">Descargar CSV</button>
          <button class="ab adl" onclick="dlXLSX('${dlKey}')">Descargar Excel</button>
        </div>
      </div>
      <div class="sum-right">
        <div class="chart-title">Distribución del período</div>
        <div class="bars">${barsHTML}</div>
        <div class="chart-legend">
          <span class="leg-item"><span class="leg-dot" style="background:var(--green)"></span>Completados</span>
          <span class="leg-item"><span class="leg-dot" style="background:var(--accent)"></span>Activos</span>
          <span class="leg-item"><span class="leg-dot" style="background:var(--red)"></span>Cancelados</span>
          <span class="leg-item"><span class="leg-dot" style="background:var(--blue)"></span>Ingresos</span>
        </div>
      </div>
    </div>
  </div>`;
}

function wkRecs(){const w=new Date(Date.now()-7*86400000).toISOString().split('T')[0];return allR.filter(x=>ds(x)>=w);}
function moRecs(){const n=new Date();const s=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-01`;return allR.filter(x=>ds(x)>=s);}
function getSD(k){return k==='week'?wkRecs():moRecs();}

function renderSummaries(){
  const el=document.getElementById('summarySection');if(!el)return;
  el.innerHTML = sumCard('Resumen — Esta semana', wkRecs(), 'week') +
                 sumCard('Resumen — Este mes',    moRecs(), 'month');
}

/* ── DOWNLOADS ── */
function rows(recs){
  const h=['Nombre','Teléfono','Manzana','Lote','Vehículo','Precio','Fecha','Hora','Estado','Estado Pago','Creada'];
  return{h,r:recs.map(x=>[x.nombre,x.telefono,x.manzana,x.lote,x.tipo_vehiculo,x.precio,ds(x),x.hora,x.status,x.estado_pago,fdt(x.created_at)])};
}
function dlCSV(k){
  const recs=getSD(k);if(!recs.length){alert('Sin datos para este período.');return;}
  const{h,r}=rows(recs);
  const csv=[h,...r].map(row=>row.map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`asd-${k}-${td()}.csv`;a.click();
}
function dlXLSX(k){
  const recs=getSD(k);if(!recs.length){alert('Sin datos para este período.');return;}
  const comp=recs.filter(x=>x.status==='completada');
  const ing=comp.filter(x=>x.estado_pago==='pagado').reduce((s,x)=>s+(x.precio||0),0);
  const lbl=k==='week'?'Esta semana':'Este mes';
  const ss=XLSX.utils.aoa_to_sheet([
    ['ASD Auto Care — '+lbl],['Generado',fdt(new Date().toISOString())],[],
    ['Ingresos cobrados','Q'+ing],['Completados',comp.length],
    ['Cancelados',recs.filter(x=>x.status==='cancelada').length],
    ['Total reservas',recs.filter(x=>x.status!=='eliminada').length]
  ]);
  const{h,r}=rows(recs);
  const ds2=XLSX.utils.aoa_to_sheet([h,...r]);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ss,'Resumen');
  XLSX.utils.book_append_sheet(wb,ds2,'Detalle');
  XLSX.writeFile(wb,`asd-${k}-${td()}.xlsx`);
}
function exportCSV(){
  if(!allR.length){alert('No hay datos.');return;}
  const{h,r}=rows(allR);
  const csv=[h,...r].map(row=>row.map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`asd-completo-${td()}.csv`;a.click();
}

/* ── TABS ── */
const TABS=['hoy','activas','historial','resenas'];
function showTab(t){TABS.forEach((tab,i)=>{document.getElementById('tab-'+tab).style.display=tab===t?'block':'none';document.querySelectorAll('.tbtn')[i].classList.toggle('active',tab===t);});renderAll();}

/* ── FILTER ── */
function setF(f,btn){cFilt=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');renderCal();}
function getFD(){
  if(cFilt==='today')return[td()];if(cFilt==='tomorrow')return[tmo()];if(cFilt==='week')return wk();
  const v=document.getElementById('customDate')?.value;return v?[v]:[td()];
}

/* ── CALENDAR ── */
function renderCal(){
  const el=document.getElementById('calView');if(!el)return;
  const dates=getFD(),slots=['8:00 AM','11:00 AM','2:00 PM'],days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  let html='';
  dates.forEach(date=>{
    const dr=allR.filter(r=>{const f=ds(r);return f===date&&r.status!=='cancelada'&&r.status!=='eliminada';});
    const day=new Date(date+'T12:00:00');
    html+=`<div class="calday"><div class="calhead"><div class="caldate">${fd(date)} <span>${days[day.getDay()]}</span></div>${date===td()?`<span class="bdg bc">Hoy</span>`:''}</div><div class="calslots">`;
    slots.forEach(s=>{
      const b=dr.find(r=>r.hora===s),urg=b&&isUrg(date,s);
      if(b)html+=`<div class="calslot taken"><div class="cstime">${s}</div><div class="csname">${b.nombre}</div><div class="csveh">${b.tipo_vehiculo||''} ${b.precio?'· Q'+b.precio:''}</div>${bdg(b.status)}${urg?'<div class="upill">Próxima</div>':''}</div>`;
      else html+=`<div class="calslot"><div class="cstime">${s}</div><div class="csfree">Disponible</div></div>`;
    });
    html+=`</div></div>`;
  });
  el.innerHTML=html||'<div class="empty">Sin reservas para este período.</div>';
}

/* ── RENDER CARD ── */
function rcard(r, hist=false){
  const act=r.status==='pendiente'||r.status==='confirmada';
  const urg=act&&isUrg(ds(r),r.hora);
  const tel=(r.telefono||'').replace(/\D/g,'');
  const waM=encodeURIComponent(`Hola ${r.nombre}, confirmamos tu cita el ${fd(r.fecha)} a las ${r.hora}. — ASD Auto Care`);
  const canC=r.estado_pago==='pagado';
  let ac='';
  if(act){
    ac+=`<a href="https://wa.me/502${tel}?text=${waM}" target="_blank" class="ab aw">WhatsApp</a>`;
    if(r.status==='pendiente')ac+=`<button class="ab ac" onclick="upS('${r.id}','confirmada')">Confirmar</button>`;
    if(r.estado_pago!=='pagado')ac+=`<button class="ab ap" onclick="upP('${r.id}','pagado')">Marcar pagado</button>`;
    if(r.status==='confirmada')ac+=`<button class="ab ao" ${canC?`onclick="upS('${r.id}','completada')"`:' disabled title="Debe pagarse primero"'}>Completar</button>`;
    ac+=`<button class="ab ax" onclick="upS('${r.id}','cancelada')">Cancelar</button>`;
    ac+=`<button class="ab ad" onclick="upS('${r.id}','eliminada')">Eliminar</button>`;
  }
  if(hist)ac+=`<button class="ab apd" onclick="openDel('${r.id}')">Borrar definitivo</button>`;
  return`<div class="rcard${urg?' urg':''}">
    <div>
      <div class="rname">${r.nombre} ${bdg(r.status)} ${urg?'<span class="upill">Próxima</span>':''}</div>
      <div class="rdet">${r.telefono||'—'} · Mz. ${r.manzana||'—'}, Lote ${r.lote||'—'}<br>${r.tipo_vehiculo||'—'} · Q${r.precio||'—'}</div>
    </div>
    <div class="rdatecol">
      <div class="rdate">${fd(ds(r))}</div>
      <div class="rhora">${r.hora}</div>
      <div class="rcreated">Creada: ${fdt(r.created_at)}</div>
    </div>
    <div class="pcol">
      <div class="plbl">Estado de pago</div>
      <select class="psel" onchange="upP('${r.id}',this.value)">
        <option value="pendiente" ${r.estado_pago!=='pagado'?'selected':''}>Sin cobrar</option>
        <option value="pagado" ${r.estado_pago==='pagado'?'selected':''}>Pagado</option>
      </select>
      ${pbdg(r.estado_pago)}
    </div>
    <div class="acts">${ac}</div>
  </div>`;
}

function renderActive(){
  const a=allR.filter(r=>r.status==='pendiente'||r.status==='confirmada');
  const el=document.getElementById('activeList');
  if(el)el.innerHTML=a.length?a.map(r=>rcard(r)).join(''):'<div class="empty">No hay reservas activas.</div>';
}
function renderHist(){
  renderSummaries();
  const co=allR.filter(r=>r.status==='completada').sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const ca=allR.filter(r=>r.status==='cancelada').sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const el=allR.filter(r=>r.status==='eliminada').sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const ec=document.getElementById('hComp'),ca2=document.getElementById('hCan'),el2=document.getElementById('hEli');
  if(ec)ec.innerHTML=co.length?co.map(r=>rcard(r,true)).join(''):'<div class="empty">Sin registros.</div>';
  if(ca2)ca2.innerHTML=ca.length?ca.map(r=>rcard(r,true)).join(''):'<div class="empty">Sin registros.</div>';
  if(el2)el2.innerHTML=el.length?el.map(r=>rcard(r,true)).join(''):'<div class="empty">Sin registros.</div>';
}

/* ── DB ACTIONS ── */
async function upS(id,s){await sb.from('reservas').update({status:s}).eq('id',id);await loadAll();}
async function upP(id,v){await sb.from('reservas').update({estado_pago:v}).eq('id',id);await loadAll();}

async function addManual(){
  const n=document.getElementById('aN').value.trim(),t=document.getElementById('aT').value.trim();
  const m=document.getElementById('aM').value.trim(),l=document.getElementById('aL').value.trim();
  const v=document.getElementById('aV').value,f=document.getElementById('aF').value;
  const h=document.getElementById('aH').value,p=document.getElementById('aP').value;
  if(!n||!f){alert('Ingresa nombre y fecha.');return;}
  const{data:ex}=await sb.from('reservas').select('id').eq('fecha',f).eq('hora',h).eq('status','confirmada');
  if(ex&&ex.length){alert('Ese horario ya está confirmado. Elige otro.');return;}
  await sb.from('reservas').insert({nombre:n,telefono:t,manzana:m,lote:l,tipo_vehiculo:v,precio:v==='Pickup / SUV'?100:80,fecha:f,hora:h,estado_pago:p,status:'confirmada'});
  ['aN','aT','aM','aL','aF'].forEach(i=>document.getElementById(i).value='');
  await loadAll();
}

/* ── MODALS ── */
let _reId=null,_delId=null;
function openDel(id){_delId=id;document.getElementById('modalDel').classList.add('show');}
function closeModals(){document.getElementById('modalRe').classList.remove('show');document.getElementById('modalDel').classList.remove('show');_reId=null;_delId=null;}
async function confirmReschedule(){
  if(!_reId)return;
  const f=document.getElementById('newFecha').value,h=document.getElementById('newHora').value;
  if(!f){alert('Selecciona fecha.');return;}
  await sb.from('reservas').update({fecha:f,hora:h,status:'confirmada'}).eq('id',_reId);
  closeModals();await loadAll();
}
async function confirmPermDelete(){
  if(!_delId)return;
  await sb.from('reservas').delete().eq('id',_delId);
  closeModals();await loadAll();
}

/* ── REVIEWS ── */
function renderRevs(){
  const pEl=document.getElementById('resPend'),pubEl=document.getElementById('resPub');
  if(!pEl)return;
  const p=allRev.filter(r=>!r.visible),pub=allRev.filter(r=>r.visible);
  const rc=r=>`<div class="revcard"><div><div class="revstars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div><div class="revtext">"${r.comentario}"</div><div class="revauthor">— ${r.nombre}</div></div>`;
  pEl.innerHTML=p.length?p.map(r=>rc(r)+`<div class="revacts"><button class="ab ac" onclick="apRev('${r.id}')">Publicar</button><button class="ab apd" onclick="delRev('${r.id}')">Eliminar</button></div></div>`).join(''):'<div class="empty">Sin reseñas pendientes.</div>';
  pubEl.innerHTML=pub.length?pub.map(r=>rc(r)+`<div class="revacts"><button class="ab ax" onclick="hiRev('${r.id}')">Ocultar</button><button class="ab apd" onclick="delRev('${r.id}')">Eliminar</button></div></div>`).join(''):'<div class="empty">Sin reseñas publicadas.</div>';
}
async function apRev(id){await sb.from('resenas').update({visible:true}).eq('id',id);await loadAll();}
async function hiRev(id){await sb.from('resenas').update({visible:false}).eq('id',id);await loadAll();}
async function delRev(id){if(!confirm('¿Eliminar esta reseña?'))return;await sb.from('resenas').delete().eq('id',id);await loadAll();}

/* ── RENDER ALL ── */
function renderAll(){renderKPI();renderCal();renderActive();renderHist();renderRevs();}
</script>
